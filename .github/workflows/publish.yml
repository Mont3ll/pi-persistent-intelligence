name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  # Run tests first — publish only if everything passes
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck

  # Publish to npm (npmjs.com) via OIDC trusted publishing — no NPM_TOKEN needed
  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      # Node >= 22.14.0 is required for trusted publishing / OIDC token exchange
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public --provenance

  # Publish to GitHub Packages — makes the GitHub repo Packages tab show the package
  publish-github:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@Mont3ll'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Set scoped package name for GitHub Packages
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf-8'));
            pkg.name = '@Mont3ll/pi-persistent-intelligence';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish to GitHub Packages
        run: npm publish
        continue-on-error: true   # GitHub Packages rejects re-publish of existing version; treat as non-fatal
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
